version: "3.8"

services:
  sinong-vllm:
    image: vllm/vllm-openai:latest
    container_name: sinong-vllm
    ports:
      - "8000:8000"
    volumes:
      - /root/ntt/lvyizhuo/nyLLM/models:/app/models:ro
    environment:
      - CUDA_VISIBLE_DEVICES=0,1,2,3
      - TZ=Asia/Shanghai
    command: [
      "--model", "/app/models",
      "--host", "0.0.0.0",
      "--port", "8000",
      "--tensor-parallel-size", "2",
      "--gpu-memory-utilization", "0.9",
      "--max-model-len", "8192",
      "--dtype", "bfloat16",
      "--trust-remote-code"
    ]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
    restart: unless-stopped
