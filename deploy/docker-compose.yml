version: "3.8"

services:
  sinong-vllm:
    build:
      context: .
      dockerfile: Dockerfile
    image: sinong1.0-8b-vllm:latest
    container_name: sinong-vllm
    ports:
      - "8000:8000"
    volumes:
      # 挂载本地模型文件（只读）
      - /data/models/Sinong1.0-8B:/app/models/Sinong1.0-8B:ro
      # 日志持久化
      - vllm-logs:/app/logs
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - TZ=Asia/Shanghai
    # 默认单卡部署；多卡时传入 GPU 数量作为第三参数
    command: ["/app/models/Sinong1.0-8B", "8000", "1"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  vllm-logs:
