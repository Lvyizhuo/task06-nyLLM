version: "3.8"

services:
  sinong-vllm:
    image: vllm/vllm-openai:latest
    container_name: sinong-vllm
    ports:
      - "8000:8000"
    volumes:
      # 挂载本地模型文件
      - /data/models/Sinong1.0-8B:/app/models/Sinong1.0-8B:ro
      # 日志持久化
      - vllm-logs:/app/logs
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - TZ=Asia/Shanghai
    command: >
      --model /app/models/Sinong1.0-8B
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.9
      --max-model-len 40960
      --tensor-parallel-size 1
      --trust-remote-code
      --dtype bfloat16
      --enforce-eager
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  vllm-logs:
